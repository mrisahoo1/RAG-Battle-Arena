services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-arena-postgres
    environment:
      POSTGRES_DB: rag_arena
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-arena-api
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag_arena
      ENABLE_DEMO_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend/data/uploads:/app/backend/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-arena-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
